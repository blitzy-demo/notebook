name: Check Release
on:
  push:
    branches: ['main']
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  check_release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Base Setup
        uses: jupyterlab/maintainer-tools/.github/actions/base-setup@v1
      
      - name: Setup Node.js for Collaboration UI Components
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'
      
      - name: Install Collaboration Dependencies
        run: |
          # Install Yjs and collaboration dependencies
          npm install -g yarn
          yarn install
          # Install collaboration-specific dependencies
          yarn add yjs@^13.5.40 y-websocket y-protocols @types/yjs
      
      - name: Build Collaboration UI Components
        run: |
          # Build TypeScript collaboration components
          echo "Building collaboration UI components..."
          
          # Build awareness component
          if [ -f "packages/notebook-extension/src/components/userPresence.tsx" ]; then
            echo "Building user presence component..."
            yarn build:component packages/notebook-extension/src/components/userPresence.tsx
          fi
          
          # Build lock indicator component  
          if [ -f "packages/notebook-extension/src/components/cellLockIndicator.tsx" ]; then
            echo "Building cell lock indicator component..."
            yarn build:component packages/notebook-extension/src/components/cellLockIndicator.tsx
          fi
          
          # Build history viewer component
          if [ -f "packages/notebook-extension/src/components/historyViewer.tsx" ]; then
            echo "Building history viewer component..."
            yarn build:component packages/notebook-extension/src/components/historyViewer.tsx
          fi
          
          # Build permissions dialog component
          if [ -f "packages/notebook-extension/src/components/permissionsDialog.tsx" ]; then
            echo "Building permissions dialog component..."
            yarn build:component packages/notebook-extension/src/components/permissionsDialog.tsx
          fi
          
          # Build comment system component
          if [ -f "packages/notebook-extension/src/components/commentSystem.tsx" ]; then
            echo "Building comment system component..."
            yarn build:component packages/notebook-extension/src/components/commentSystem.tsx
          fi
          
          # Build collaboration bar component
          if [ -f "packages/notebook-extension/src/components/collaborationBar.tsx" ]; then
            echo "Building collaboration bar component..."
            yarn build:component packages/notebook-extension/src/components/collaborationBar.tsx
          fi
          
          # Build main collaboration extension
          if [ -f "packages/notebook-extension/src/index.ts" ]; then
            echo "Building notebook collaboration extension..."
            cd packages/notebook-extension && yarn build
          fi
      
      - name: Export CRDT Schema Definitions
        run: |
          # Export CRDT schema definitions for version compatibility
          echo "Exporting CRDT schema definitions..."
          mkdir -p .collaboration-artifacts/schemas
          
          # Create schema export script
          cat > export-schemas.js << 'EOF'
          const fs = require('fs');
          const path = require('path');
          
          // Define CRDT schema definitions for Jupyter Notebook collaboration
          const schemas = {
            notebookDocument: {
              version: "1.0.0",
              description: "Yjs document schema for collaborative notebook editing",
              properties: {
                cells: {
                  type: "Y.Array",
                  description: "Array of notebook cells with collaborative editing support"
                },
                metadata: {
                  type: "Y.Map", 
                  description: "Notebook metadata with collaborative updates"
                },
                nbformat: {
                  type: "number",
                  description: "Notebook format version"
                }
              }
            },
            cellDocument: {
              version: "1.0.0", 
              description: "Yjs document schema for individual cell collaboration",
              properties: {
                source: {
                  type: "Y.Text",
                  description: "Cell source code with real-time collaborative editing"
                },
                outputs: {
                  type: "Y.Array",
                  description: "Cell outputs array"
                },
                metadata: {
                  type: "Y.Map",
                  description: "Cell metadata"
                },
                cell_type: {
                  type: "string",
                  description: "Type of cell (code, markdown, raw)"
                }
              }
            },
            awareness: {
              version: "1.0.0",
              description: "User presence and awareness data schema",
              properties: {
                user: {
                  type: "object",
                  properties: {
                    name: { type: "string" },
                    color: { type: "string" },
                    cursor: { type: "object" }
                  }
                }
              }
            },
            locks: {
              version: "1.0.0", 
              description: "Cell locking state schema",
              properties: {
                cellId: { type: "string" },
                userId: { type: "string" },
                timestamp: { type: "number" },
                lockType: { type: "string", enum: ["edit", "view"] }
              }
            },
            comments: {
              version: "1.0.0",
              description: "Comment thread schema for collaborative review",
              properties: {
                id: { type: "string" },
                cellId: { type: "string" },
                thread: { type: "Y.Array" },
                resolved: { type: "boolean" },
                anchor: { type: "object" }
              }
            }
          };
          
          // Write schema definitions
          fs.writeFileSync('.collaboration-artifacts/schemas/crdt-schemas.json', 
            JSON.stringify(schemas, null, 2));
          
          // Generate compatibility matrix
          const compatibility = {
            schemaVersion: "1.0.0",
            yjsVersion: "^13.5.40",
            compatibleVersions: ["1.0.0"],
            migrationPaths: [],
            breaking_changes: []
          };
          
          fs.writeFileSync('.collaboration-artifacts/schemas/compatibility.json', 
            JSON.stringify(compatibility, null, 2));
          
          console.log("CRDT schemas exported successfully");
          EOF
          
          node export-schemas.js
      
      - name: Validate Yjs Document Schema Compatibility
        run: |
          # Validate Yjs document schema version compatibility
          echo "Validating Yjs document schema compatibility..."
          
          # Create schema validation script
          cat > validate-schemas.js << 'EOF'
          const fs = require('fs');
          
          try {
            // Load schema definitions
            const schemas = JSON.parse(fs.readFileSync('.collaboration-artifacts/schemas/crdt-schemas.json', 'utf8'));
            const compatibility = JSON.parse(fs.readFileSync('.collaboration-artifacts/schemas/compatibility.json', 'utf8'));
            
            // Validate schema structure
            console.log("Validating schema structure...");
            
            // Check required schemas exist
            const requiredSchemas = ['notebookDocument', 'cellDocument', 'awareness', 'locks', 'comments'];
            for (const schema of requiredSchemas) {
              if (!schemas[schema]) {
                throw new Error(`Required schema '${schema}' is missing`);
              }
              console.log(`✓ Schema '${schema}' found`);
            }
            
            // Validate Yjs version compatibility
            console.log("Validating Yjs version compatibility...");
            const yjsVersion = compatibility.yjsVersion;
            if (!yjsVersion || !yjsVersion.match(/\^13\.\d+\.\d+/)) {
              throw new Error(`Invalid Yjs version: ${yjsVersion}`);
            }
            console.log(`✓ Yjs version ${yjsVersion} is compatible`);
            
            // Check for breaking changes
            if (compatibility.breaking_changes && compatibility.breaking_changes.length > 0) {
              console.warn("⚠️  Breaking changes detected:", compatibility.breaking_changes);
            }
            
            console.log("✅ Schema validation completed successfully");
          } catch (error) {
            console.error("❌ Schema validation failed:", error.message);
            process.exit(1);
          }
          EOF
          
          node validate-schemas.js
      
      - name: Build Collaboration Server Handlers
        run: |
          # Build Python server-side collaboration handlers as notebook-collab extra
          echo "Building collaboration server handlers..."
          
          # Install Python collaboration dependencies
          pip install hatch build
          
          # Create collaboration package setup if it doesn't exist
          if [ ! -f "pyproject-collab.toml" ]; then
            cat > pyproject-collab.toml << 'EOF'
          [build-system]
          requires = ["hatchling"]
          build-backend = "hatchling.build"
          
          [project]
          name = "notebook-collab"
          description = "Collaborative editing extensions for Jupyter Notebook"
          dynamic = ["version"]
          dependencies = [
            "notebook",
            "tornado>=6.2.0",
            "ypy>=0.6.0",
            "pycrdt>=0.7.0"
          ]
          
          [project.optional-dependencies]
          collaboration = [
            "ypy-websocket>=0.8.0",
            "pycrdt-websocket>=0.12.0"
          ]
          
          [tool.hatch.version]
          path = "notebook/_version.py"
          
          [tool.hatch.build.targets.wheel]
          packages = ["notebook"]
          EOF
          fi
          
          # Build collaboration package
          if [ -f "notebook/handlers.py" ]; then
            echo "Building collaboration handlers package..."
            python -m build --config-setting="--build-option=--collaboration" .
          fi
      
      - name: Version Compatibility Checks for Yjs Documents  
        run: |
          # Add version compatibility checks for Yjs document schemas
          echo "Performing Yjs document version compatibility checks..."
          
          # Create compatibility test script
          cat > test-compatibility.js << 'EOF'
          const fs = require('fs');
          
          try {
            // Load current schema version
            const schemas = JSON.parse(fs.readFileSync('.collaboration-artifacts/schemas/crdt-schemas.json', 'utf8'));
            const compatibility = JSON.parse(fs.readFileSync('.collaboration-artifacts/schemas/compatibility.json', 'utf8'));
            
            console.log("Testing Yjs document version compatibility...");
            
            // Test schema versioning
            const currentVersion = compatibility.schemaVersion;
            console.log(`Current schema version: ${currentVersion}`);
            
            // Validate version format
            if (!currentVersion.match(/^\d+\.\d+\.\d+$/)) {
              throw new Error(`Invalid version format: ${currentVersion}`);
            }
            
            // Check compatible versions
            const compatibleVersions = compatibility.compatibleVersions || [];
            if (!compatibleVersions.includes(currentVersion)) {
              throw new Error(`Current version ${currentVersion} not in compatible versions list`);
            }
            
            // Test document migration paths
            console.log("Checking migration paths...");
            const migrationPaths = compatibility.migrationPaths || [];
            console.log(`Available migration paths: ${migrationPaths.length}`);
            
            // Validate Yjs types in schemas
            console.log("Validating Yjs type definitions...");
            const validYjsTypes = ['Y.Array', 'Y.Map', 'Y.Text', 'Y.Doc'];
            
            function validateSchema(schema, path = '') {
              if (schema.properties) {
                for (const [key, prop] of Object.entries(schema.properties)) {
                  const propPath = path ? `${path}.${key}` : key;
                  if (prop.type && prop.type.startsWith('Y.')) {
                    if (!validYjsTypes.includes(prop.type)) {
                      throw new Error(`Invalid Yjs type '${prop.type}' at ${propPath}`);
                    }
                    console.log(`✓ Valid Yjs type '${prop.type}' at ${propPath}`);
                  }
                  if (prop.properties) {
                    validateSchema(prop, propPath);
                  }
                }
              }
            }
            
            // Validate all schemas
            for (const [schemaName, schema] of Object.entries(schemas)) {
              console.log(`Validating schema: ${schemaName}`);
              validateSchema(schema, schemaName);
            }
            
            console.log("✅ All compatibility checks passed");
          } catch (error) {
            console.error("❌ Compatibility check failed:", error.message);
            process.exit(1);
          }
          EOF
          
          node test-compatibility.js
      
      - name: Check Release
        uses: jupyter-server/jupyter_releaser/.github/actions/check-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version_spec: next

      - name: Upload Core Distributions
        uses: actions/upload-artifact@v4
        with:
          name: notebook-jupyter-releaser-dist-${{ github.run_number }}
          path: .jupyter_releaser_checkout/dist
      
      - name: Upload Collaboration UI Components
        uses: actions/upload-artifact@v4
        with:
          name: collaboration-ui-components-${{ github.run_number }}
          path: |
            packages/notebook-extension/lib/components/
            packages/notebook-extension/lib/index.js
            packages/notebook-extension/lib/index.d.ts
      
      - name: Upload Collaboration Server Handlers
        uses: actions/upload-artifact@v4
        with:
          name: collaboration-server-handlers-${{ github.run_number }}
          path: |
            dist/notebook_collab-*.whl
            dist/notebook-collab-*.tar.gz
        if: success() && hashFiles('dist/notebook*collab*') != ''
      
      - name: Upload CRDT Schema Definitions
        uses: actions/upload-artifact@v4
        with:
          name: crdt-schema-definitions-${{ github.run_number }}
          path: |
            .collaboration-artifacts/schemas/crdt-schemas.json
            .collaboration-artifacts/schemas/compatibility.json
      
      - name: Upload Collaboration Artifacts Bundle
        uses: actions/upload-artifact@v4
        with:
          name: collaboration-complete-bundle-${{ github.run_number }}
          path: |
            .collaboration-artifacts/
            packages/notebook-extension/lib/components/
            dist/notebook*collab*
            packages/notebook/lib/collab/